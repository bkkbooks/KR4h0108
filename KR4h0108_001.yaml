body:
  text: 詩紀匡謬常熟馮舒撰凡例云一上古迄秦以針銘誦誄備載原夫書契既興英賢代作文章流别其來久矣若針銘誦誄可以備載則賦亦詩家六義之一何以區分若云有韻之語可以廣收則國策管韓之屬何往非韻素問一書通篇有韻易之文言本自聖製書之敷言出于孔壁亦自諧聲不專辭達可得混為詩耶作俑於茲濫觴無極焦氏易林居然入詩矣豈不可歎一漢以後詩人先帝王次諸家以世次為序先帝王而後諸家以世次為序似矣然有必不安者子桓與吳質書云徐陳應劉一時俱逝是知數子盡卒於建安之年藝文之序仲宣每云漢王粲此可證也然七子宗主陳思列陳思於徐陳輩之後理所不可然置徐陳輩於陳思之後可得謂之世次如此乎藝文之序人也每要其終而言之故江令亦曰隋江總然唐人已目之為梁江總矣必以其達於陳而係之陳也可乎一名家成集者各分五言四言六言雜言一人所作咸備諸體一題所賦或别體裁未有可以篇之長短韻之多少為次者古人之集亡來已久陳思蔡雍二陸隂何俱係後人編集四言五言亦並間出足知宋文鑑以前無分體之事矣玄暉文通二集是原本然玄暉首撰樂府三言五言間列文通稍如後世體例但五言之外本無别體可以異同今一人之作必以四言先於五言一題所賦又以三韻先於四韻即如蕭子顯春别一詩簡文元帝各有和章首末各三韻四句惟次章六句三韻今以六句之故各移第二章為末章是猶歌南曲者以尾聲止於三句而移之引子之前也何俟知音始為拊掌一詩數見而句字不同者參校其義稍長者為正文古人著書各出己意試以班范二書校東觀袁荀二紀其一切詔令無不各出已裁即如所載之詩亦從刪改理宜以一書為主而互注異同若擇其義之長者為正則每書各取數字令人何所適從即如瓠子一歌史作皓皓旰旰漢作浩浩洋洋史作為我謂河伯漢作皇謂河公今史漢各擇一句豈浩浩洋洋漢長于史皇謂河公班遜於遷耶此俱由朝補之楚辭後語刪改所誤一樂府起于漢又其辭多古雅故系之漢按宋書樂志相和已下諸篇其無人名者皆曰古辭樂府詩集靈芝等篇亦然鍾氏詩品曰古詩其體源出于國風去者日已疏四十五首疑是建安中陳思王所製則作者姓名既無的定漢魏之界頗亦難分古之云者時世不定之辭也昭明所選一十九章或云枚乘或云傅毅概曰古詩原其體分意亦如此詩既如此樂府可知槩歸之漢所謂無稽之言君子弗聽矣爰及橫吹之題梁清商之題晉郭氏亦但原其始耳或稱古辭或稱晉宋齊詞何嘗有一定時代而妄作耶大風歌鴻鵠歌按文選云漢髙帝歌一首漢藝文志云髙帝歌詩二篇則此二篇但當云髙帝歌二首不得增大風鴻鵠之名也初學記云漢歌曲有大風文中子云大風安不忘危並是以章首二字為義如論語之學而為政詩之關雎葛覃耳又按漢書名大風為三侯之章又曰作風起之詩琴操又名大風起其曰大風歌者藝文類聚始也樂府詩集因吾為若楚歌之文名鴻鵠篇為楚歌其曰鴻鵠歌者楚辭後語始也此等雖無傷大義然今人習而不察遂謂古實有此題臨文引用亦所不安即如宋人竊憤録一書記徽欽北狩事容齋極辨其妄萬厯末年郡中人從嚴氏鈔本鬻之本無撰人余邑有吳君平者妄增辛棄疾三字於卷首余謂之曰此從何來君平曰世人不知書若無姓氏便爾見忽故借重稼軒此僅可欺不知者如公自不必怪也近有一友作心史序首句便云余嘗讀辛稼軒竊憤録不覺失笑故作文者茍不原所始趂筆便用大風鴻鵠等題當與辛稼軒之紕繆同類而共笑之矣將安所施將字注云一作尚今按史記漢書並是尚字將字所出乃是楚辭後語耳蒲稍天馬歌按漢書曰太初四年獲汗血馬作西極天馬歌史記曰馬名蒲稍則此歌當題西極天馬歌不得曰蒲稍也又按漢書但云作歌明是刪郊祀之文不得直𨽻武帝也若此章可收則太一歌理同一例何以獨削原所自始當從左克明樂府誤是耶非耶漢書作非耶是耶立而望之偏何姍姍其來遲藝文則作是耶非耶立而望之偏娜娜何冉冉其來遲樂府亦作是耶非耶並作偏無翩字柏梁詩作臺在元封三年此詩每句各注姓名然細考之頗多未核自大司馬至左馮翊皆按百官公卿表而為之至太常曰周建德則元鼎五年已坐擅縣太樂令論矣大鴻臚曰壺充國按表充國以太初元年為此官少府曰王溫舒而溫舒三年已徙右扶風曰李成信此時成信為右內史參錯如此豈更可信比閲藝文類聚乃於本詩之上各署作者首句有皇帝曰三字次句有梁王曰三字以下則但稱其官而無姓名有姓有名者惟東方朔耳太平御覽引漢武帝集亦如是然後知以下姓名皆後人增之而非原文也何人增之曰注文苑者增之何以言之古文苑之注不知何人大率蕪淺如伯喈青衣賦妄斷為少年之作降為小字此其拘腐可知今按無注宋板文苑每句之下小字分行於驂駕駟馬句下止注梁王二字則孝王武三字明是注文苑者所增矣然舊本文苑注亦自明辨每句二行分注左行曰梁王右行曰孝王武當可意推自詩紀通二行作一句直曰梁王孝王武詩刪因之而舉世夢夢矣幽歌樂府詩集題曰趙幽王歌漢書曰趙王餓乃歌初無幽歌之目也直出詩紀杜撰已下燕剌王歌廣陵王瑟歌廣川王望鄉修成歌俱此類不重述東方朔誡子詩劉節廣文選第十一卷有東方朔誡子詩今按任昉文章緣起云誡後漢杜篤作女誡文心雕龍云戒者慎也禹稱戒之用休東方朔之誡子亦顧命之作也是則誡之與詩區分已久藝文誡類與詩别出此篇但稱東方朔誡子不云詩也若可兼載則何不遂收曹大家女誡耶猶幸詩刪僅讀馮書詩歸見聞有限不然天下幾無剩篇矣髙彪清誡例亦同此又按太平御覽引東方朔集作明者處世莫尚于中庸則知截作四言者直是班史所刪耳東方自有據地一歌近出史記去彼載此更自可笑司馬相如封禪頌頌不為詩猶之賦也前例已明况此頌自喻以封巒已下參散不倫周詩逸軌不知何以妄載詩紀襲謬遂誤淺夫息夫躬絶命辭此騷體也文選别出秋風辭體例可見若命為詩則小山招隱淵明歸去辭何以獨棄李陵别歌按漢書但云單于許武還李陵置酒賀武因起舞歌曰無别歌之題也戚夫人舂歌烏孫公主悲愁歌同結髮為夫婦注云玉臺作留别妻玉臺第一卷有此詩題云蘇武詩一首並不作留别妻也因此一誤今人更有以梁武代蘇屬國婦一首為武妻答詩更可笑虞美人答項王楚歌此詩出楚漢春秋見正義四面楚歌聲作四方楚歌聲詩紀改一字不啻徑庭卓文君白頭吟宋書大曲有白頭吟作古辭樂府詩集太平御覽亦然玉臺新咏題作皚如山上雪非但不作文君并題亦不作白頭吟也惟西京雜記有文君為白頭吟以自絶之説然亦不著其詞或文君自有别篇不得遽以此詩當之也宋人不明其故妄以此詩實之如黃鶴杜詩注合璧事類引西京雜記之類并入此詩詩紀因之詩刪選之今人遽云有此妙口妙筆真長卿快偶可笑可憐班固明堂等詩此賦後所述非别篇也馴至齊梁每賦稱詩豈能並載張衡定情歌思玄詩亦同此例張衡四愁詩一思曰注云玉臺無此三字今按玉臺第九卷有此四章並有之馮公未見宋本耳蔡雍樊惠渠歌蔡集今所傳者已不同藝文第九卷渠類有此在頌類前序亦不同是妄刪為之者琴歌亦釋誨末章所系不得刪入酈炎見志詩東漢書無此題後篇藝文作蘭詩昔有霍家奴奴字樂府玉臺俱作姝古人命詞多不直致不得因監奴而妄改也黃山谷詩任淵注亦作姝董嬌嬈按嬈字音乃小切戲弄也苛擾也無饒音毛晃增入宵韻而以杜陵詩細馬自馱金騕裊佳人屢出董嬌嬈為證今據此字凡古人所用嬌嬈皆是食傍無作女者此詩玉臺藝文樂府諸書亦並從食祗因毛晃誤增韻會襲謬遂爾舉世亡此一字又按今本杜詩正作饒字宋元諸本亦並為饒不知毛韻何以妄增而今人妄聽并改嬌作妖也王吉射烏辭按風俗通引漢明帝起居注曰王吉射中之祝曰云云則是祝非詩也不應加辭字而入詩紀蘇伯玉妻盤中詩樂府解題云盤中詩傅玄作玉臺新咏第九卷有此詩亦曰傅玄其為休奕詩無疑也惟北堂書鈔曰古詩亦無名氏其曰蘇伯玉妻者巖羽吟卷盲説耳世人敢于信吟卷而不敢信解題玉臺等書寃哉君忘妾未知之今時人知四足談友夏評云未知之婉甚柔甚不知玉臺正作天知之鍾伯敬評云今時人知四足與其書不能讀當從中央周四角云千古不識字男子被此女郎一語輕薄殆盡不知玉臺正作今時人智不足而所謂女郎者乃是剛徑亮直之丈夫也言之可發一笑竇玄妻古怨歌此四句御覽兩載皆題曰古艷歌無名氏藝文載玄妻别夫書有衣不如新二句不應截作詩已又改其題曰怨歌也龎德公於忽操於忽操三章選詩拾遺云出襄陽耆舊傳此書亡亦已久初尚意余輩見聞寡陋用修或有此書今按宋王令逢原所著廣陵先生集其外孫邵説所編者共二十卷其第一卷賦後第九篇即此操其序云劉表見龎德公欲起之公不願曰我歌可乎命弟子治一作絃之凡三操第十篇題辭粟操曰列子辭粟作第十一題陬操曰孔子去趙作第十二題樗髙操曰惠子望大樗作明是逢原托之古人也若於忽操可稱龎公則後三篇何不并稱列子惠子孔子乎妄作欺人真可忿有一少年謂豫曰安知非今本王令集反借此篇豫曰王令集不足信宋文鑑家家有之何以亦載此篇亦題王令乎愚人之惑難解如此練時日漢書練時日等俱列在章左曰練時日一帝臨二足知郊祀歌是此十九篇之題而練時日等則以此分章亦如所謂學而為政耳自郭氏樂府首列郊祀歌之題移置練時日等為次行詩紀因之後人遂習而不察鍾伯敬批曰造題古奧豈不寃殺若然則學而二字更竒崛矣雁門太守行宋書上列洛陽行三字下列雁門太守行五字明是洛陽行是此詩之題而雁門太守行為此篇之調也以今日南曲之體辟之則雁門太守行者如所謂梁州序念奴嬌耳命調則同賦題各異自郭氏樂府始去洛陽行三字而舉世眯目疑其以雁門太守歌洛陽令矣又王僧虔伎録云雁門太守行歌古洛陽令一篇亦可知古之雁門太守行不獨此一篇但被之管絃則此篇耳餘如短歌行之對酒西伯燕歌行之秋風别日俱如此類宋書甚明學者可撿對也斜柯西北眄樂府玉臺俱作斜柯文人襲用不少自詩紀改作斜倚詩刪因之而此字亡矣新婦初來時小姑始扶牀今日被驅逐小姑如我長按此四句是顧况棄婦詩宋本玉臺無小姑始扶牀今日被驅逐十字樂府詩集左克明樂府亦然其增之者蘭雪堂活字玉臺始也初看此詩似覺少此十字不得再四尋之知竟是後人妄添何以言之逋翁一代名家豈應直述漢詩可疑一也逋翁詩云及至見君歸君歸妾已老則扶牀之小姑何怪如我此詩前云共事三二年始爾未為久則何得三年未周長成遽如許耶正是後人見逋翁詞妄增入耳幸有諸本可以確證今蘇郡刻左氏樂府反據詩紀增入更隔幾十年不可問矣書之日就散亡可為浩歎匡衡歌漢書但云為之語耳不稱歌也凡曰謡曰歌曰諺曰稱曰語古並通用然須各還其本字可以兼載不得妄改擬蘇李録别詩文苑但稱録别詩藝文往返雜敘並無擬字大蘇妄斷為六朝擬作足知大蘇已前並不疑為後人所擬也此字亦是詩紀所加世人遂謂骨肉緣枝葉等篇為蘇李原詩燦燦三星等為六朝擬作矣妄生間界可歎可悲紅塵蔽天地篇按古文苑止載二句下缺文選李善本西都賦注亦載二句蔽字作塞已下十二句升菴詩話云出修文御覽此書亡來已久所不敢信然以文義考之首云白日何冥冥何得遽接云招搖西北指天漢東南傾耶短褐中無緒帶斷續以繩二句别見御覽緒作絮又小謝詩曰瀉酒置井中誰能辨斗升合如杯中水誰能辨淄澠今直合作二句無論惠連必無勦襲之病可得謂之文理通備否藳砧等篇俱無的時代此亦古辭也古樂府蘭草自然香此詩見刊謬正俗題作古艷歌然作言第三句作十月腰鎌起亦無的時代兩頭纎纎青玉玦此詩王建集有之不得謂為漢詩也文帝秋胡行泛水緑池末四句本是善哉行本辭或魏文自移入秋胡調中或樂人填詞或荀朂所撰定俱不可知不必注見善哉行也臨髙臺亦然子建閨情此詩見藝文美婦人部無題今本曹集不足據也贈侍中王粲四言詩北堂書鈔作誄藝文有子建王侍中誄雖無此四句文體却近決非詩也徐幹室思雜詩按樂府詩集云徐幹室思詩其第三章曰自君之出矣宋孝武自君之出矣金翠暗無精詩藝文亦題擬室思則此詩之為室思無疑也今遽以前五篇為雜詩而獨以人靡不有初當室思誤也程曉藝文晉程曉業與傅玄贈答自應入晉阮籍詠懷四言共十四首江隂朱子儋本尚有之今並刪去何也司馬懿宴飲歌晉書云髙祖伐公孫淵過溫見父老故舊宴飲纍日悵然有感作歌曰無宴飲之題也樂府詩集八十五卷有此篇亦曰晉髙祖歌成公綏行詩一云途中作藝文在行旅部無題舍藝文無别出不知所謂行詩途中作者何出傅玄和秋胡行按玉臺題和班氏詩似擬咏史之作也故曰彼夫既不淑此婦亦太剛直作史家案斷語今作秋胡行乃是誤讀樂府詩集所致原夫郭氏之書聚詩集之樂府立名之意已主廣收故凡樂府之題例俱取入青青河畔草即係之飲馬長城窟日出東南隅即係之陌上桑例曰同前而不别出本題然作者各為題目豈得槩刪為樂府詩集則可為詩紀則不可飲馬長城窟行玉臺樂府俱無夢君結同心四句藝文所載至曠如參與商而止未知後四句何人所增董桃行歷九秋篇馮紀注云玉臺新咏以前十首為簡文按玉臺新咏第九卷有此詩俱題傅玄不得因選詩拾遺而疑之也苦雨苦熱天行歌俱見藝文俱無題天行歌亦然陸機吳趨行此詩樂府明注無名氏士衡别有一篇張翰雜詩二首第一首見文選第二首俱出藝文言志部東鄰有一樹六句為一首忽有一飛鳥六句又為一首俱無題翔風王子年拾遺記及太平廣記俱翾風今坊本拾遺從艷異編改郭璞贈潘尼見藝文衣冠部次陸機贈潘尼後未必即贈潘也楊方合歡詩二首雜詩三首樂府詩集作合歡詩五首玉臺第三卷有此詩亦總五首今曰玉臺後三首作雜詩惡板所誤也庾闡遊仙詩四首同前六首此詩藝文並載今移第一第二為第三第四而别題曰同前六首何也蘭亭序詩據栁公權書本云四言詩王羲之為序序行於代故不録其詩文多不可同載今各裁其佳句而題之亦古人斷章之義也則知今世所傳俱非全文皆誠懸刪本也其五言詩序亦刪興公之作序下小字注曰文多不備載其略如此其詩亦裁而掇之如四言焉明是右軍為四言之序而興公為五言之序也今混載四五言而移孫序於末簡又并栁公所注而添入序中又增末句曰所賦詩亦裁而綴之如前四言五言焉妄而窒矣謝混送二王在領軍府集詩此詩見初學記前四句作謝琨後二句作謝混陸沖雜詩二首藝文在遊覽部無題休洗紅休洗紅遍考無出楊慎云於棧道壁得之妄也宋孝武自君之出矣玉臺題作擬徐幹藝文作擬室思樂府詩集題自君之出矣樂府體例正與傅玄秋胡詩同自應據玉臺藝文不應據樂府也下又注云玉臺作許瑶玉臺第十卷有此詩並不作許瑶正作孝武耳秋胡詩九首按文選作一首玉臺分九章亦作一首此正如關雎三章原只一篇耳自詩紀分九首而詩刪遂摘取三章矣可笑謝靈運王子等讚讚别於詩例同頌誄不得以其近于五言而混收也范泰詠老藝文老部有此詩而無詠老之題署曰梁范泰或梁自有其人不得即以當蔚宗之父也王融和南海王秋胡詩七首此篇並同顔延之藝文文苑樂府詩集俱作一首丘巨源咏扇丘巨源咏七寶扇詩玉臺初學藝文俱載中有畫作景山樹圖為河洛神句五言律祖妄造首尾别作八句律詩必也古今謂無一人讀書始可任其亂説耳不知律説之成在于景龍之沈宋其造端于士章休文者祗論宫商不專平仄此未可片言而畢聊附存此以諗知音梁武帝白紵辭注云藝文樂府作簡文今從玉臺作武帝按藝文玉臺無此詩樂府英華正作武帝不作簡文也河中之水歌玉臺亦作古辭不作武帝藉田藝文止八句至嵗薄禮節少止初學有公卿秉耒耜四句而無仁化洽孩蟲等六句未知此六句竟在何所不得以意連屬也答蕭琛梁書但云上答而已語雖有韻實不稱詩梁簡文帝泛舟橫大江三首滄波白日暉一首英華樂府俱有之隴西四戰地悠悠懸斾旌二首俱出樂府題作隴西行非泛舟橫大江也京洛篇注云樂府作煌煌京雒行列鮑照後而逸作者之名按樂府目作宋鮑照二首卷中作同前二首下注宋鮑照則樂府之非逸名可知也但此詩亦見藝文英華俱作梁簡文則樂府為誤蓮花賦歌此亦賦末所係不知樂府何以混載當釐正小垂手大垂手一篇玉臺作簡文樂府作吳均小垂手篇樂府亦作吳均舍樂府别無所出自不得并入簡文也夜夜曲注玉臺作簡文北斗闌干去一篇樂府作沈約玉臺作簡文愁人夜獨傷一篇玉臺無此詩樂府明注無名氏不應混入也簡文自有擬沈隱侯夜夜曲正是擬河漢縱復橫篇耳劉孝威王遵七夕穿針庾肩吾石橋徐摛壞橋王臺卿水中樓影題不云和簡文或各自立題不得附簡文後元帝出江陵縣還二首第二首朝出屠羊縣篇藝文祗曰又詩未必即是前題也後園作回文詩藝文序王融後無的姓名簡文雖有和湘東王後園回文詩然畢竟缺疑為得馮君注云今列于此以俟再考亦非決定之辭吳琯併去此注遂令觀者不解范雲有所思樂府作王融者非此詩樂府作王融藝文亦作王融舍二書之外無所見不知何據而歸彥龍也望織女注云從玉臺作范雲玉臺無范雲詩擬古四色詩四色詩四首按藝文俱王融詩别無所出庾肩吾有所思此詩舍樂府之外無他出樂府既作昭明應無可疑不知何以入庾餞張孝總應令藝文題作應令在餞張孝總後未必即餞張也曲水聯句藝文序簡文詩後題云又曲水聯句此詩宜附簡文不然則殿下為何人也吳均春怨此詩見玉臺第六卷目録云吳均二十首張率擬樂府三首查卷中自和蕭洗馬至詠少年已足二十首之數自春怨至秋閨怨十七首目録竟無撰人張率樂府在此後竟未定此十七首是何人作也雜按藝文樂府等書知月夜咏陳南康新有所納是王僧孺詩為人自傷亦王作則知中間十三首亦係王詩矣惟春怨一篇在吳均後秋閨怨一篇在張率前俱無的姓名未可強為之説詩紀竟以歸王特照時本玉臺耳非的説也蕭子顯陌上桑注云玉臺作蕭子顯玉臺無此詩自應依樂府作無名氏第二首樂府之外亦無别出應作王臺卿陶𢎞景華陽頌並是頌不得稱詩王僧孺春思注云玉臺誤作吳均今按此詩在玉臺第十卷正作僧孺不作吳均也徐勉夏詩英華作徐朏初學記作徐晚不得置修仁卷中鄧鏗和隂梁州首句云别離雖未久遂如長别離藝文玉臺俱同今作暫别猶添恨何忍别經時不知所出月夜閨中次聯亦然劉令嫺答唐娘七夕嵗時雜詠及玉臺俱作徐悱代陳慶之美人夢見故人有期不至三首俱姚翻詩范靜妻沈氏戲蕭娘注云玉臺作戲繡娘玉臺正作蕭不作繡字越城曲樂府無名應是古辭陳後主楊叛兒曲按樂府作隋後主唐人每稱煬帝為後主則此曲意亦煬帝所著改隋作陳非也楊升菴遂以越王侗當之選詩拾遺并改題為京洛行更妄而可怪小窗詩按姚寬西溪叢話云此乃唐人方域詩唐藝文志所載煙花録記幸廣陵事此本已亡今本偽作沈炯字初明按陳書並作禮明太平御覽册府元龜並作禮惟南史作初明陳書舊南監本此葉是宋板似可據南史不得善本俟再考江總梅花落注云從玉臺玉臺作於梁簡文在東宫之日安得有入陳之詩耶姬人怨服散篇此詩出藝文止是一首不得分作二篇英華注明甚岑之敬烏棲曲明月二八照花新當罏十五晚留賔二句本之敬烏棲曲載在樂府今截此二句添回眸百萬橫自陳一句别題當壚曲楊君之妄不待言矣詩紀每至楊君妄作之詩俱注明出處意亦疑信半參吳琯再翻此書則併棄馮紀所注遂為楚人妄談之柄劉刪賦獨鶴凌雲去藝文作劉那此詩既無他出何以直斷云誤蕭驎詠袙復初學作詠裙復在裙部玉臺宋本亦作袙馮注云疑作衵按集韻袙字注云袙復音莫白切衵字出左傳此二字也王胄西園遊上方樂府序王胄後明注無名氏徐儀暮秋望月英華失名無可考不知何以定為徐儀孔德紹王澤領遭洪水按德紹以從竇建德伏誅其不入唐也明矣髙廷禮妄載之品彚而改徒知懷趙景終是倦陽侯二句于木梗誠無托蘆灰豈暇求之上今查初學英華俱倒此二句則其為品彚妄改無疑今反從品彚更正無識一何至此陳子良新成安樂宫一首樂府云唐陳子良春晚看羣公朝還一首初學序張文琮後韋元旦前賦得妓一首初學敘李元操後𢎞執恭前七夕看新婦隔巷停車注云玉臺作陳伯材玉臺無此詩也初學又序于褚亮之後咏春雪一首初學在上官儀前未必俱在隋之作也李密淮陽感秋據隋書密亡抵淮陽舍村中變姓名稱劉知逺鬱鬱不得志為五言詩無淮陽感秋之題也唐隋二史亦互異同李巨仁英華載京洛篇在梁簡文後張正見前似非隋人樂府則竟作隋李世臣矣十索曲丁六娘僅四曲後二句樂府明注無名氏并混丁作是升菴妄語李月素等五篇不知所出近見新安鄭玄撫續玉臺有之未可據也庾信擬咏懷詩按藝文但稱庾信咏懷詩並無擬字此直子山自咏其懷耳增一擬字遂謂以阮公為法如文通之效阮矣夫阮公當晉魏之際寓托微逺顔延年謂其百代之下難以情測子山自梁入周意氣激露論世不同原情各異杜老所謂清新意正在此若曰擬阮則何啻徑庭世人不察妄生議論皆此一字誤之詩紀匡謬
