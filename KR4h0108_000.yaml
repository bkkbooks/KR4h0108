body:
  text: 詩紀匡謬總集類提要臣等謹案詩紀匡謬一卷國朝馮舒撰舒字已蒼號默庵常熟人舒因李攀龍詩刪鍾惺談元春詩歸所載古詩輾轉沿訛而其源總出于馮惟訥之古詩紀因作是書以糾之凡一百一十二條其中如於忽操三章為宋王令詩兩頭纖纖青玉玦一章為王建詩休洗紅為楊慎詩一一辨之而楊慎石鼓文僞本全載卷中置不一詰何也又蘇伯玉妻盤中詩詩紀作漢人固謬宋本玉臺新詠列于傅休奕詩後不別出伯玉妻名乃嘉定間陳玉父刻本偶佚其名觀滄浪詩話稱蘇伯玉妻有此體見玉臺集則嚴羽所見之本實題伯玉妻舒執宋刻駁惟訥惟訥無辭如執宋刻以駁羽則羽為宋人凡所見無非宋刻乃於數百年後執一宋刻以傲之恐羽轉嘻然笑矣然舒所抉摘多中其失考證之精實出惟訥之上原原本本證佐確然固於讀古詩者大有所禆不得議為吹求也古詩全本明代凡有四家梅禹金之詩乘惟漢魏全録而六朝則刪節不完張之象之古詩類苑近于𨽻事之書但供剽掇不足見作者源流臧懋循之古詩所分體猥雜補綴冗脞義例尤不足觀惟惟訥書自古逸以至隋末沿革正變始末秩然號為善本而不免小有疏漏得舒是書糾之俾讀者棄其瑕疵而挹其英華相輔而行雖謂之羽翼詩紀可矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9659616ddaa3196428cd002718207d3043de2a2e3178300096ae38a0a4de67ac
